services:
  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  backend:
    build: ./porfolio-expessjs-mongodb
    ports:
      - "5000:5000"
    env_file:
      - ./porfolio-expessjs-mongodb/.env
    depends_on:
      - mongodb
    networks:
      - app-network

  frontend:
    build: ./portfolio-react
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
