apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: docker-projet-nouveau-backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: portfolio-secret
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: portfolio-secret
              key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc
  namespace: portfolio
spec:
  selector:
    app: backend
  ports:
  - port: 5000
    targetPort: 5000